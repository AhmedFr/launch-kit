name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! The more detail you give, the faster it gets fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I…, Launch Kit…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Click…
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Generation provider
      options:
        - mock
        - openrouter
        - not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, and browser.
      placeholder: macOS 15 · Node 20 · pnpm 11 · Chrome 130
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Terminal or browser-console output. Redact any API keys before pasting.
      render: shell
